<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F5EFE4" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#151318" media="(prefers-color-scheme: dark)">
    <title>2026 東京之旅</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="slowpoke.png">
    <link rel="apple-touch-icon" href="slowpoke.png">

    <style>
        :root {
            --washi: #F5EFE4;      /* 和紙底色 */
            --paper: #FFFDF8;      /* 紙卡 */
            --ink: #2E2A25;        /* 墨色 */
            --sub: #8A8378;
            --vermillion: #C4453C; /* 朱紅 */
            --dot: rgba(60, 50, 40, 0.07);
            --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --washi: #151318;
                --paper: #211E24;
                --ink: #F2EDE3;
                --sub: #9A948A;
                --vermillion: #E06A5E;
                --dot: rgba(255, 255, 255, 0.05);
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
            min-height: 100dvh; /* 使用 dvh 避免手機網址列影響高度 */
            overflow: hidden;
            font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
            /* 和紙質感：底色 + 細點紋 */
            background-color: var(--washi);
            background-image: radial-gradient(var(--dot) 1px, transparent 1.3px);
            background-size: 20px 20px;
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 右上角的日之丸紅日暈 */
        .sun {
            position: fixed;
            top: -12vmin;
            right: -14vmin;
            width: 58vmin;
            height: 58vmin;
            border-radius: 50%;
            background: radial-gradient(circle, var(--vermillion) 0%, transparent 68%);
            opacity: 0.22;
            pointer-events: none;
            z-index: 0;
        }
        /* 左下角淡淡的圓弧呼應 */
        .sun-2 {
            position: fixed;
            bottom: -20vmin;
            left: -18vmin;
            width: 52vmin;
            height: 52vmin;
            border-radius: 50%;
            border: 2px solid var(--vermillion);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }

        .stack {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* 依序淡入 */
        .stack > * {
            opacity: 0;
            animation: riseIn 0.8s var(--ease-out) forwards;
        }
        .date-badge { animation-delay: 0.1s; }
        h1          { animation-delay: 0.22s; }
        .polaroid   { animation-delay: 0.38s; }
        .enter-btn  { animation-delay: 0.6s; }

        @keyframes riseIn {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 車票風日期標籤 */
        .date-badge {
            display: inline-block;
            padding: 7px 20px;
            border: 1.5px dashed var(--vermillion);
            border-radius: 6px;
            color: var(--vermillion);
            background: var(--paper);
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 14px;
        }

        h1 {
            font-size: clamp(2.4rem, 11vw, 3.2rem);
            font-weight: 700;
            margin: 0 0 20px;
            line-height: 1.1;
            letter-spacing: 0.14em;
            color: var(--ink);
        }
        h1 .accent { color: var(--vermillion); }

        /* 拍立得照片卡 */
        .polaroid {
            background: var(--paper);
            padding: 10px 10px 0;
            border-radius: 4px;
            box-shadow: 0 14px 34px -10px rgba(46, 42, 37, 0.35);
            transform: rotate(-2deg);
            position: relative;
            margin: 0 0 30px;
        }
        /* 紙膠帶 */
        .polaroid::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            width: 96px;
            height: 26px;
            background: var(--vermillion);
            opacity: 0.55;
            transform: translateX(-50%) rotate(3deg);
            border-radius: 2px;
        }
        .polaroid img {
            display: block;
            width: min(74vw, 320px);
            height: min(40vh, 360px);
            object-fit: cover;
            object-position: center 30%;
            border-radius: 2px;
        }
        .polaroid figcaption {
            font-size: 1.02rem;
            font-weight: 700;
            color: var(--ink);
            padding: 12px 6px 14px;
        }

        .enter-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 210px;
            min-height: 56px;
            padding: 0 34px;
            background: var(--vermillion);
            border: none;
            border-radius: 32px;
            color: #fff;
            text-decoration: none;
            font-size: 1.08rem;
            font-weight: 700;
            letter-spacing: 3px;
            box-shadow: 0 12px 26px -8px rgba(196, 69, 60, 0.55);
            transition: transform 0.25s var(--ease-out), box-shadow 0.25s ease, filter 0.25s ease;
        }
        .enter-btn .arrow {
            display: inline-block;
            transition: transform 0.25s var(--ease-out);
        }
        @media (hover: hover) {
            .enter-btn:hover { filter: brightness(1.07); box-shadow: 0 16px 32px -8px rgba(196, 69, 60, 0.6); }
            .enter-btn:hover .arrow { transform: translateX(5px); }
        }
        .enter-btn:active { transform: scale(0.95); }
        .enter-btn:focus-visible { outline: 3px solid var(--vermillion); outline-offset: 4px; }

        @media (prefers-reduced-motion: reduce) {
            .stack > * { animation: none; opacity: 1; }
        }

        /* 較矮的螢幕：縮小照片保持一屏放得下 */
        @media (max-height: 700px) {
            .polaroid img { height: 34vh; }
            h1 { margin-bottom: 12px; }
            .polaroid { margin-bottom: 20px; }
        }
    </style>
</head>
<body>
    <div class="sun"></div>
    <div class="sun-2"></div>
    <main class="stack">
        <div class="date-badge">2026.01.09 - 01.14</div>
        <h1><span class="accent">TOKYO</span><br>TRIP</h1>
        <figure class="polaroid">
            <img src="cover.jpg" alt="">
            <figcaption>與小晴任的東京之旅 ❤️</figcaption>
        </figure>
        <a href="itinerary.html" class="enter-btn">開始旅程 <span class="arrow">→</span></a>
    </main>
</body>
</html>
