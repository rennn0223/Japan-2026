<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>2026 東京之旅</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="slowpoke.png">
    <link rel="apple-touch-icon" href="slowpoke.png">

    <style>
        :root {
            --glass-border: 1px solid rgba(255, 255, 255, 0.35);
            --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            height: 100dvh; /* 使用 dvh 避免手機網址列影響高度 */
            width: 100vw;
            overflow: hidden;
            font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
            background-color: #000;
        }

        .bg-image {
            position: absolute;
            inset: 0;
            background-image: url('cover.jpg');
            background-size: cover;
            /* 人臉在中間偏上，對齊中間偏上方 */
            background-position: center 30%;
            background-repeat: no-repeat;
            z-index: 1;
            animation: kenburns 24s var(--ease-out) both;
            will-change: transform;
        }

        /* 開場時緩慢縮放，讓畫面有呼吸感 */
        @keyframes kenburns {
            from { transform: scale(1.08); }
            to   { transform: scale(1); }
        }

        .overlay {
            position: absolute;
            inset: 0;
            /* 上淺下深的遮罩 + 邊緣暗角，讓白字更清楚也更聚焦 */
            background:
                radial-gradient(120% 90% at 50% 20%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.35) 100%),
                linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.25) 45%, rgba(0,0,0,0.72) 100%);
            z-index: 2;
        }

        .content {
            position: absolute;
            top: 68%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: 90%;
            max-width: 500px;

            text-align: center;
            color: white;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 元素依序淡入，營造層次感 */
        .content > * {
            opacity: 0;
            animation: riseIn 0.9s var(--ease-out) forwards;
        }
        .date-badge { animation-delay: 0.15s; }
        h1          { animation-delay: 0.30s; }
        .lead       { animation-delay: 0.45s; }
        .enter-btn  { animation-delay: 0.65s; }

        @keyframes riseIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .date-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 18px;
            border: var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 2.5px;
            margin-bottom: 22px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
        }

        h1 {
            /* clamp 讓字級在小螢幕與桌機間平滑縮放 */
            font-size: clamp(2.6rem, 12vw, 3.6rem);
            font-weight: 700;
            margin: 0 0 14px 0;
            line-height: 1.12;
            letter-spacing: 0.06em;
            text-shadow: 0 4px 18px rgba(0,0,0,0.55);
        }

        .lead {
            font-size: 1.1rem;
            opacity: 0.92;
            margin: 0 0 42px 0;
            font-weight: 500;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .enter-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 210px;
            min-height: 58px;
            padding: 0 32px;
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.65);
            border-radius: 32px;
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.35);
            transition: transform 0.25s var(--ease-out), background 0.25s ease, box-shadow 0.25s ease;
            position: relative;
        }

        /* 淡入結束後才開始漂浮，兩段動畫互不打架 */
        .enter-btn { animation: riseIn 0.9s var(--ease-out) 0.65s forwards, float 3.2s ease-in-out 1.8s infinite; }

        .enter-btn .arrow {
            display: inline-block;
            transition: transform 0.25s var(--ease-out);
        }

        @media (hover: hover) {
            .enter-btn:hover {
                background: rgba(255, 255, 255, 0.32);
                box-shadow: 0 14px 38px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.4);
            }
            .enter-btn:hover .arrow { transform: translateX(5px); }
        }

        .enter-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.4);
        }

        .enter-btn:focus-visible {
            outline: 3px solid rgba(255, 255, 255, 0.9);
            outline-offset: 4px;
        }

        @keyframes float {
            0%   { transform: translateY(0); }
            50%  { transform: translateY(-8px); }
            100% { transform: translateY(0); }
        }

        /* 尊重系統的減少動態偏好 */
        @media (prefers-reduced-motion: reduce) {
            .bg-image, .content > *, .enter-btn { animation: none; opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="overlay"></div>
    <main class="content">
        <div class="date-badge">2026.01.09 - 01.14</div>
        <h1>TOKYO<br>TRIP</h1>
        <p class="lead">與小晴任的東京之旅 ❤️</p>
        <a href="itinerary.html" class="enter-btn">開始旅程 <span class="arrow">→</span></a>
    </main>
</body>
</html>
